name: Build ARM64 & Deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/5queezer/hermes-agent-arm64
  UPSTREAM_REPO: NousResearch/hermes-agent

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Check upstream commit
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote "https://github.com/$UPSTREAM_REPO.git" HEAD | cut -f1)
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          LAST_SHA=$(cat .last-upstream-sha 2>/dev/null || echo "none")
          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes ($UPSTREAM_SHA)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New upstream: $LAST_SHA → $UPSTREAM_SHA"
          fi

  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream source
        run: git clone --depth=1 "https://github.com/$UPSTREAM_REPO.git" hermes-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ needs.check.outputs.upstream_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Track upstream SHA
        run: |
          echo "${{ needs.check.outputs.upstream_sha }}" > .last-upstream-sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-upstream-sha
          git commit -m "upstream ${{ needs.check.outputs.upstream_sha }}"
          git push

      - name: Deploy to Coolify
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true"
